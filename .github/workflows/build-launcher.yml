name: Build Launcher Binaries

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    tags:
      - 'v*'  # Auto-build on version tags (v1.0, v2.1, etc.)

permissions:
  contents: write  # Required to create GitHub Releases

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            binary: dist/ImageScraper.exe
            artifact: ImageScraper-windows
          - os: macos-latest
            name: macos
            binary: dist/ImageScraper
            artifact: ImageScraper-macos
          - os: ubuntu-latest
            name: linux
            binary: dist/ImageScraper
            artifact: ImageScraper-linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: python build-launcher.py

      # macOS: create universal2 binary (ARM + Intel in one file)
      - name: Make macOS universal binary
        if: runner.os == 'macOS'
        run: |
          pip install lipo
          # Rename ARM binary, rebuild for x86_64, then merge
          mv dist/ImageScraper dist/ImageScraper-arm64
          python -m PyInstaller --onefile --name ImageScraper --console --noconfirm --clean --target-architecture x86_64 launcher.py || true
          if [ -f dist/ImageScraper ]; then
            mv dist/ImageScraper dist/ImageScraper-x86_64
            lipo -create dist/ImageScraper-arm64 dist/ImageScraper-x86_64 -output dist/ImageScraper
            rm dist/ImageScraper-arm64 dist/ImageScraper-x86_64
            echo "Universal binary created"
            file dist/ImageScraper
          else
            echo "x86_64 build failed, using ARM-only binary"
            mv dist/ImageScraper-arm64 dist/ImageScraper
          fi

      - name: Prepare distribution
        shell: bash
        run: |
          mkdir -p package
          cp ${{ matrix.binary }} package/
          cp app.py index.html config.json requirements.txt package/
          cp -r static package/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: package/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create ZIP packages
        run: |
          cd ImageScraper-windows && zip -r ../ImageScraper-windows.zip . && cd ..
          cd ImageScraper-macos && zip -r ../ImageScraper-macos.zip . && cd ..
          cd ImageScraper-linux && zip -r ../ImageScraper-linux.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ImageScraper-windows.zip
            ImageScraper-macos.zip
            ImageScraper-linux.zip
          generate_release_notes: true
